name: Release

on:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and Upload
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none

      - name: Configure Composer authentication
        run: composer config --global github-oauth.github.com ${{ secrets.GITHUB_TOKEN }}

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install production dependencies
        run: composer install --no-dev --no-interaction --optimize-autoloader --prefer-dist

      - name: Create plugin zip
        run: |
          mkdir -p build/wp-ai-agent
          cp -r src/ build/wp-ai-agent/src/
          cp -r vendor/ build/wp-ai-agent/vendor/
          cp wp-ai-agent.php build/wp-ai-agent/
          cp LICENSE build/wp-ai-agent/
          cp README.md build/wp-ai-agent/
          cp CHANGELOG.md build/wp-ai-agent/
          cp composer.json build/wp-ai-agent/
          cd build && zip -r ../wp-ai-agent.zip wp-ai-agent/

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" wp-ai-agent.zip --clobber
